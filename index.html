<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunflowers for her 🌻</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #1a0205 0%, #060002 60%, #010001 100%);
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, CX, BASE;

function resize() {
  W    = canvas.width  = window.innerWidth;
  H    = canvas.height = window.innerHeight;
  CX   = W / 2;
  BASE = H * 0.87;
}
resize();
window.addEventListener('resize', resize);

/* ── helpers ─────────────────────────────── */
const clamp   = (v,a,b) => Math.max(a, Math.min(b, v));
const easeOut = x => 1 - Math.pow(1 - x, 3);
const seg     = (p,s,e) => easeOut(clamp((p-s)/(e-s), 0, 1));

/* ── stars ───────────────────────────────── */
const STARS = Array.from({length: 220}, () => ({
  x:     Math.random(),
  y:     Math.random() * 0.80,
  r:     Math.random() * 1.1 + 0.15,
  phase: Math.random() * Math.PI * 2,
  speed: 0.022 + Math.random() * 0.038,
  gold:  Math.random() < 0.18
}));

function drawBg() {
  const bg = ctx.createRadialGradient(CX, H*0.5, 10, CX, H*0.35, H*0.75);
  bg.addColorStop(0,    '#211505'); 
  bg.addColorStop(0.38, '#120a02');
  bg.addColorStop(0.72, '#080401');
  bg.addColorStop(1,    '#030200');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  
  // warm floor glow
  const pool = ctx.createRadialGradient(CX, BASE+20, 5, CX, BASE-40, 260);
  pool.addColorStop(0, 'rgba(120, 80, 5, 0.25)');
  pool.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = pool;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  for (const s of STARS) {
    s.phase += s.speed;
    const a = 0.15 + 0.48 * Math.abs(Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.gold ? `rgba(255,215,120,${a})` : `rgba(255,215,200,${a})`;
    ctx.fill();
  }
}

/* ── sparkles ────────────────────────────── */
const SPARKS = Array.from({length: 32}, () => { const s={}; resetSp(s); s.life=Math.random()*s.max; return s; });
function resetSp(s) {
  s.x    = CX + (Math.random()-0.5)*250;
  s.y    = BASE - 60 - Math.random()*350;
  s.vy   = -0.26 - Math.random()*0.52;
  s.life = 0;
  s.max  = 0.6 + Math.random()*0.5;
  s.sz   = 1.5 + Math.random()*2.5;
  s.hue  = Math.random()<0.65 ? 44+Math.random()*26 : 30+Math.random()*20; 
}
function drawSparkles(show) {
  if (!show) return;
  for (const s of SPARKS) {
    s.life += 0.009;
    if (s.life > s.max) resetSp(s);
    const a = Math.sin((s.life/s.max)*Math.PI) * show;
    ctx.beginPath();
    ctx.arc(s.x + Math.sin(s.life*4)*5, s.y + s.vy*s.life*55, s.sz, 0, Math.PI*2);
    ctx.fillStyle   = `hsla(${s.hue},100%,75%,${a})`;
    ctx.shadowColor = `hsla(${s.hue},100%,85%,${a})`;
    ctx.shadowBlur  = 12;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }
}

/* ── bezier helpers ──────────────────────── */
function bezPt(x0,y0, cx1,cy1, cx2,cy2, x1,y1, t) {
  const m = 1-t;
  return [
    m*m*m*x0 + 3*m*m*t*cx1 + 3*m*t*t*cx2 + t*t*t*x1,
    m*m*m*y0 + 3*m*m*t*cy1 + 3*m*t*t*cy2 + t*t*t*y1
  ];
}

function bezAngle(x0,y0, cx1,cy1, cx2,cy2, x1,y1, t) {
  const m = 1-t;
  const dx = 3*m*m*(cx1-x0) + 6*m*t*(cx2-cx1) + 3*t*t*(x1-cx2);
  const dy = 3*m*m*(cy1-y0) + 6*m*t*(cy2-cy1) + 3*t*t*(y1-cy2);
  return Math.atan2(dy, dx);
}

function drawStem(x0,y0, cx1,cy1, cx2,cy2, x1,y1, prog, thick, col) {
  if (prog <= 0) return;
  ctx.beginPath();
  const steps = 48;
  for (let i = 0; i <= steps*prog; i++) {
    const [px,py] = bezPt(x0,y0,cx1,cy1,cx2,cy2,x1,y1, i/steps);
    i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.strokeStyle = col;
  ctx.lineWidth   = thick;
  ctx.lineCap     = 'round';
  ctx.shadowColor = col;
  ctx.shadowBlur  = 3;
  ctx.stroke();
  ctx.shadowBlur  = 0;
}

/* ── broad sunflower leaves ──────────────── */
function drawLeaf(x, y, rot, size, prog) {
  if (prog <= 0) return;
  const s = size * prog;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(s * 0.4, s * 0.3, s, 0);
  ctx.quadraticCurveTo(s * 0.4, -s * 0.3, 0, 0);
  
  const lg = ctx.createLinearGradient(0, 0, s, 0);
  lg.addColorStop(0, '#1b6522');
  lg.addColorStop(1, '#348f32');
  ctx.fillStyle = lg;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(s * 0.5, 0, s * 0.9, 0);
  ctx.strokeStyle = 'rgba(0, 50, 0, 0.4)';
  ctx.lineWidth = s * 0.03;
  ctx.stroke();

  ctx.lineWidth = s * 0.015;
  for(let i=1; i<=3; i++) {
      ctx.beginPath();
      ctx.moveTo(s * 0.25 * i, 0);
      ctx.lineTo(s * 0.25 * i + s*0.15, s*0.1);
      ctx.moveTo(s * 0.25 * i, 0);
      ctx.lineTo(s * 0.25 * i + s*0.15, -s*0.1);
      ctx.stroke();
  }

  ctx.restore();
}

/* ── proper static sunflower ─────────────── */
function drawFlower(x, y, size, prog, t, wob, stemAngle) {
  if (prog <= 0) return;
  
  const s   = size * prog * 1.5; 
  const rot = (stemAngle + Math.PI/2) * 0.4 + Math.sin(t*0.001 + wob) * 0.04;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  function drawPetalRing(radius, count, color, offset, glow) {
    ctx.fillStyle = color;
    if (glow) {
      ctx.shadowColor = '#ff8c00';
      ctx.shadowBlur = 18 * prog;
    } else {
      ctx.shadowBlur = 4;
      ctx.shadowColor = 'rgba(0,0,0,0.5)'; 
    }

    for (let i = 0; i < count; i++) {
      ctx.save();
      ctx.rotate((i / count) * Math.PI * 2 + offset);
      ctx.beginPath();
      ctx.moveTo(0, -radius * 0.1);
      ctx.quadraticCurveTo(radius * 0.2, -radius * 0.5, 0, -radius);
      ctx.quadraticCurveTo(-radius * 0.2, -radius * 0.5, 0, -radius * 0.1);
      ctx.fill();

      ctx.strokeStyle = 'rgba(210, 100, 0, 0.3)';
      ctx.lineWidth = radius * 0.015;
      ctx.beginPath();
      ctx.moveTo(0, -radius * 0.2);
      ctx.lineTo(0, -radius * 0.85);
      ctx.stroke();
      ctx.restore();
    }
    ctx.shadowBlur = 0;
  }

  // 1. Back green sepals
  ctx.fillStyle = '#1b6522';
  for (let i = 0; i < 16; i++) {
    ctx.save();
    ctx.rotate((i / 16) * Math.PI * 2);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-s * 0.08, -s * 0.4);
    ctx.lineTo(0, -s * 0.55);
    ctx.lineTo(s * 0.08, -s * 0.4);
    ctx.fill();
    ctx.restore();
  }

  // 2. Petal Layers
  drawPetalRing(s * 0.95, 26, '#ffaa00', 0, true);
  drawPetalRing(s * 0.85, 26, '#ffd700', Math.PI / 26, false);

  // 3. Composite Center
  ctx.fillStyle = '#4a2511';
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.42, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#3a3b10';
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.33, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#1a1805';
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.20, 0, Math.PI * 2);
  ctx.fill();

  // 4. Static Sunflower Seeds (Fermat's Spiral)
  ctx.fillStyle = '#6b4412';
  const goldenAngle = 137.5 * (Math.PI / 180);
  
  for (let i = 0; i < 200; i++) {
    const r = Math.sqrt(i) * (s * 0.027); // Space out seeds evenly
    if (r > s * 0.38) break; // Keep inside bounds
    const a = i * goldenAngle;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * r, Math.sin(a) * r, s * 0.012, 0, Math.PI * 2);
    ctx.fill();
  }

  // Static Yellow pollen dots edge
  ctx.fillStyle = '#ccaa00';
  for (let i = 0; i < 250; i++) {
    const r = Math.sqrt(i) * (s * 0.027);
    if (r < s * 0.33 || r > s * 0.41) continue; 
    const a = i * goldenAngle + 0.5;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * r, Math.sin(a) * r, s * 0.009, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

/* ════════════════════════════════════════════
   STEMS
   ════════════════════════════════════════════ */
const START    = Date.now();
const DURATION = 5400;
let   progress = 0;

function buildStems(sc) {
  return [
    { bxo: -100*sc, byo: 0, cp1x: -120*sc, cp1y: -100*sc, cp2x: -150*sc, cp2y: -220*sc, tx: -180*sc, ty: -310*sc, fs: 40*sc, ps:[0.05, 0.46], wob: 1.3 },
    { bxo: -45*sc,  byo: 0, cp1x: -55*sc,  cp1y: -70*sc,  cp2x: -75*sc,  cp2y: -150*sc, tx: -95*sc,  ty: -230*sc, fs: 32*sc, ps:[0.03, 0.41], wob: 0.5 },
    { bxo:   0,     byo: 0, cp1x:   0,     cp1y: -130*sc, cp2x:   0,     cp2y: -265*sc, tx:   0,     ty: -400*sc, fs: 52*sc, ps:[0.00, 0.37], wob: 0.0 },
    { bxo:  45*sc,  byo: 0, cp1x:  55*sc,  cp1y: -70*sc,  cp2x:  75*sc,  cp2y: -150*sc, tx:  95*sc,  ty: -230*sc, fs: 32*sc, ps:[0.04, 0.42], wob: -0.5 },
    { bxo:  100*sc, byo: 0, cp1x:  120*sc, cp1y: -100*sc, cp2x:  150*sc, cp2y: -220*sc, tx: 180*sc,  ty: -310*sc, fs: 40*sc, ps:[0.06, 0.47], wob: -1.4 },
  ];
}

function draw() {
  const elapsed = Date.now() - START;
  progress = Math.min(elapsed / DURATION, 1);
  const p  = progress;
  const t  = elapsed;

  ctx.clearRect(0, 0, W, H);
  drawBg();
  drawStars();

  let sc = Math.min(W,H) / 700;
  if (W < 600) sc = W / 350; 

  const bx    = CX;
  const by    = BASE;
  const SD    = '#164a1a'; 
  const SL    = '#2caa38';   
  const stems = buildStems(sc);

  /* STEMS + LEAVES + FLOWERS */
  stems.forEach((st, idx) => {
    const sx0  = bx + st.bxo,  sy0  = by;
    const sx1  = bx + st.tx,   sy1  = by + st.ty;
    const cp1x = bx + st.cp1x, cp1y = by + st.cp1y;
    const cp2x = bx + st.cp2x, cp2y = by + st.cp2y;
    const sp   = seg(p, st.ps[0], st.ps[1]);

    drawStem(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, sp, 3.8*sc, SD);
    drawStem(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, sp, 1.8*sc, SL);

    /* — Carefully positioned leaves (Removed inner/cluttering leaves) — */
    let leafData = [];
    if (idx === 0) leafData = [{ t: 0.35, dir: -1 }]; // Far-left stem, points left
    if (idx === 2) leafData = [{ t: 0.40, dir: -1 }, { t: 0.55, dir: 1 }]; // Center stem, both sides
    if (idx === 4) leafData = [{ t: 0.35, dir: 1 }]; // Far-right stem, points right

    leafData.forEach((leaf) => {
      if (sp > leaf.t) {
        const [lx, ly] = bezPt(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, leaf.t);
        const lAngle   = bezAngle(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, leaf.t);
        const leafRot  = lAngle + (Math.PI / 2.5) * leaf.dir; 
        const lProg    = clamp((sp - leaf.t) * 5, 0, 1); 
        
        drawLeaf(lx, ly, leafRot, st.fs * 1.6, lProg);
      }
    });

    /* — flower — */
    const curT     = Math.min(sp, 1);
    const [fx, fy] = bezPt(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, curT);
    const angle    = bezAngle(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, curT);
    const fp       = seg(p, st.ps[1]-0.05, st.ps[1]+0.22);
    
    drawFlower(fx, fy, st.fs, fp, t, st.wob, angle);
  });

  /* SPARKLES */
  drawSparkles(seg(p, 0.32, 0.54));

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
